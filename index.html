  <style>
    :root {
      color-scheme: dark;
      --sk-bg: #080b12;
      --sk-card: rgba(255, 255, 255, .055);
      --sk-border: rgba(255, 255, 255, .08);
      --sk-line: linear-gradient(90deg, rgba(255,255,255,.04), rgba(255,255,255,.13), rgba(255,255,255,.04));
    }

    .boot-shell {
      min-height: 100vh;
      padding: 7.5rem 2rem 4rem;
      background:
        radial-gradient(circle at 84% 0%, rgba(59, 130, 246, .16), transparent 34%),
        radial-gradient(circle at 10% 85%, rgba(34, 211, 238, .09), transparent 30%),
        var(--sk-bg);
      color: #f0f4ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .boot-nav,
    .boot-grid,
    .boot-photo,
    .boot-pill,
    .boot-line {
      overflow: hidden;
      position: relative;
      background: var(--sk-card);
      border: 1px solid var(--sk-border);
    }

    .boot-nav::after,
    .boot-photo::after,
    .boot-pill::after,
    .boot-line::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--sk-line);
      animation: boot-shimmer 1.4s infinite;
      transform: translateX(-100%);
    }

    .boot-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      border-width: 0 0 1px;
      backdrop-filter: blur(18px);
    }

    .boot-grid {
      max-width: 1160px;
      margin: 0 auto;
      border: 0;
      background: transparent;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 4rem;
      align-items: center;
    }

    .boot-copy { display: grid; gap: 1rem; }
    .boot-pill { width: 190px; height: 32px; border-radius: 999px; }
    .boot-line { height: 20px; border-radius: 8px; }
    .boot-line.big { height: 74px; max-width: 620px; }
    .boot-line.mid { max-width: 520px; }
    .boot-line.short { max-width: 360px; }
    .boot-actions { display: flex; gap: .8rem; margin-top: .5rem; }
    .boot-actions .boot-line { width: 150px; height: 46px; }
    .boot-photo { aspect-ratio: 3 / 4; border-radius: 22px; }

    @keyframes boot-shimmer {
      to { transform: translateX(100%); }
    }

    @media (max-width: 860px) {
      .boot-shell { padding: 8.5rem 1rem 4rem; }
      .boot-grid { grid-template-columns: 1fr; gap: 2rem; }
      .boot-photo { max-width: 330px; width: 100%; margin: 0 auto; }
    }
  </style>

          <div class="boot-actions">
            <div class="boot-line"></div>
            <div class="boot-line"></div>
          </div>
        </div>
        <div class="boot-photo"></div>
